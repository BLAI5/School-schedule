<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Morning Routine Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            overscroll-behavior-y: contain;
        }

        .clock-container {
            position: relative;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .clock-hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            width: 4px;
            height: 42%;
            background: #1e293b;
            transform-origin: bottom center;
            border-radius: 4px;
            z-index: 20;
            transition: transform 0.2s linear;
        }

        .clock-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 12px;
            height: 12px;
            background: #1e293b;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 30;
        }

        .task-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            user-select: none;
            -webkit-user-select: none;
        }

        .dragging {
            opacity: 0.5;
            transform: scale(0.98);
            background-color: #f1f5f9 !important;
            border-style: dashed !important;
            z-index: 50;
        }

        .task-active {
            transform: scale(1.02);
            border-left: 8px solid !important;
            background-color: white;
            box-shadow: 0 4px 12px -1px rgba(0, 0, 0, 0.1);
        }

        .drag-handle {
            cursor: grab;
            padding: 12px;
            color: #cbd5e1;
            touch-action: none;
        }
        
        .drag-handle:active {
            cursor: grabbing;
        }

        .edit-input {
            border-bottom: 2px solid #e2e8f0;
            outline: none;
            background: transparent;
        }
        .edit-input:focus {
            border-bottom-color: #6366f1;
        }

        .color-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .color-dot.active {
            border-color: #6366f1;
            transform: scale(1.1);
        }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center min-h-screen">

    <div class="max-w-md w-full">
        <header class="text-center mb-6">
            <h1 class="text-3xl font-bold text-slate-800">Morning Routine</h1>
            <p id="totalTimeLabel" class="text-slate-500 font-medium">Total Time: 70m</p>
        </header>

        <!-- Visual Clock -->
        <div class="flex justify-center mb-8">
            <div class="clock-container" id="clock">
                <div class="clock-center"></div>
                <div class="clock-hand" id="hand" style="transform: rotate(0deg)"></div>
                <svg viewBox="0 0 100 100" class="absolute inset-0 w-full h-full transform -rotate-90">
                    <g id="donut-segments"></g>
                </svg>
            </div>
        </div>

        <!-- Timer Display -->
        <div class="text-center mb-4 bg-white py-4 rounded-2xl shadow-sm border border-slate-100">
            <div id="timerDisplay" class="text-5xl font-mono font-bold text-slate-700 leading-none">00:00</div>
            <div id="currentTaskLabel" class="text-sm font-semibold uppercase tracking-wider text-indigo-500 mt-3">Ready to start?</div>
        </div>

        <!-- Controls -->
        <div class="flex flex-col gap-3 mb-8">
            <div class="flex gap-3">
                <button id="startBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-bold shadow-lg transition active:scale-95">
                    Start Routine
                </button>
                <button id="resetBtn" class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-6 py-3 rounded-xl font-bold transition active:scale-95 text-sm">
                    Reset
                </button>
            </div>
            <button id="testAudioBtn" class="text-xs text-slate-400 font-semibold uppercase hover:text-indigo-500 transition">
                🔊 Enable Audio / Test Beep
            </button>
        </div>

        <!-- Task List -->
        <div id="taskList" class="space-y-3 mb-4">
            <!-- Tasks injected here -->
        </div>

        <!-- Add Task Button -->
        <button id="addTaskBtn" class="w-full py-4 border-2 border-dashed border-slate-200 rounded-xl text-slate-400 font-bold hover:border-indigo-300 hover:text-indigo-400 transition flex items-center justify-center gap-2 mb-10">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Add New Task
        </button>
    </div>

    <script>
        const DEFAULT_TASKS = [
            { id: 1, name: "Wake up & Dress", duration: 15, color: "#93c5fd" },
            { id: 2, name: "Washroom", duration: 5, color: "#60a5fa" },
            { id: 3, name: "Eat Breakfast", duration: 20, color: "#fbbf24" },
            { id: 4, name: "Make Lunch", duration: 10, color: "#34d399" },
            { id: 5, name: "Brush Teeth", duration: 5, color: "#2dd4bf" },
            { id: 6, name: "Brush Hair", duration: 5, color: "#818cf8" },
            { id: 7, name: "School Bag", duration: 2, color: "#f472b6" },
            { id: 8, name: "Dance Bag", duration: 3, color: "#fb7185" },
            { id: 9, name: "Go to Car", duration: 5, color: "#475569" }
        ];

        let tasks = JSON.parse(localStorage.getItem('morning_routine_tasks')) || DEFAULT_TASKS;

        let timer = null;
        let elapsedSeconds = 0; // Total seconds since the start of the whole routine
        let editingId = null;
        let lastTaskId = null;
        
        const colors = ["#93c5fd", "#60a5fa", "#fbbf24", "#34d399", "#2dd4bf", "#818cf8", "#f472b6", "#fb7185", "#475569", "#a855f7"];

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function saveToStorage() {
            localStorage.setItem('morning_routine_tasks', JSON.stringify(tasks));
        }

        function playBeep(frequency, startTime) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(frequency, startTime);
            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(0.1, startTime + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.1);
            osc.start(startTime);
            osc.stop(startTime + 0.15);
        }

        function playTripleBeep() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            playBeep(880, now);
            playBeep(880, now + 0.2);
            playBeep(880, now + 0.4);
        }

        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const addTaskBtn = document.getElementById('addTaskBtn');
        const testAudioBtn = document.getElementById('testAudioBtn');
        const timerDisplay = document.getElementById('timerDisplay');
        const hand = document.getElementById('hand');
        const taskList = document.getElementById('taskList');
        const donutSegments = document.getElementById('donut-segments');
        const currentTaskLabel = document.getElementById('currentTaskLabel');
        const totalTimeLabel = document.getElementById('totalTimeLabel');

        function getTotalMinutes() {
            return tasks.reduce((sum, t) => sum + t.duration, 0);
        }

        function renderTasks() {
            taskList.innerHTML = '';
            tasks.forEach((task) => {
                const isEditing = editingId === task.id;
                const div = document.createElement('div');
                div.id = `task-row-${task.id}`;
                div.className = `task-card flex items-center p-3 rounded-xl border border-slate-200 bg-white`;
                div.style.borderLeft = `4px solid ${task.color}`;
                div.draggable = !isEditing;
                div.dataset.id = task.id;

                div.innerHTML = `
                    <div class="flex-1 min-w-0 pr-2 pointer-events-none">
                        ${isEditing ? 
                            `<div class="space-y-2 pointer-events-auto">
                                <input id="edit-name-${task.id}" class="edit-input font-medium text-slate-700 w-full mb-1" value="${task.name}" placeholder="Task Name">
                                <div class="flex items-center gap-2">
                                    <input id="edit-dur-${task.id}" type="number" class="edit-input w-16" value="${task.duration}">
                                    <span class="text-xs text-slate-400 font-bold">MINS</span>
                                </div>
                                <div class="flex flex-wrap gap-2 pt-1">
                                    ${colors.map(c => `<div class="color-dot ${task.color === c ? 'active' : ''}" style="background-color: ${c}" onclick="setEditColor(${task.id}, '${c}')"></div>`).join('')}
                                </div>
                            </div>` : 
                            `<div class="font-bold text-slate-700 truncate">${task.name}</div>`
                        }
                        <div class="text-xs text-slate-400 font-medium uppercase tracking-tight">
                            ${!isEditing ? `${task.duration} minutes` : ''}
                        </div>
                    </div>
                    <div class="flex items-center gap-1 shrink-0">
                        ${isEditing ? 
                            `<div class="flex flex-col gap-2">
                                <button onclick="saveTask(${task.id})" class="text-white font-bold text-xs bg-indigo-600 px-3 py-2 rounded-lg">SAVE</button>
                                <button onclick="deleteTask(${task.id})" class="text-red-500 font-bold text-[10px] bg-red-50 px-3 py-1 rounded-lg">DELETE</button>
                            </div>` : 
                            `<button onclick="editTask(${task.id})" class="text-slate-300 hover:text-indigo-600 p-2">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                            </button>
                            <div class="drag-handle">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                            </div>`
                        }
                    </div>
                `;

                div.addEventListener('dragstart', (e) => {
                    if (editingId) return e.preventDefault();
                    div.classList.add('dragging');
                });

                div.addEventListener('dragend', () => {
                    div.classList.remove('dragging');
                    saveNewOrder();
                });

                taskList.appendChild(div);
            });

            setupDragAndDrop();
            updateUI();
        }

        function setupDragAndDrop() {
            taskList.addEventListener('dragover', (e) => {
                e.preventDefault();
                const afterElement = getDragAfterElement(taskList, e.clientY);
                const draggable = document.querySelector('.dragging');
                if (!draggable) return;
                if (afterElement == null) {
                    taskList.appendChild(draggable);
                } else {
                    taskList.insertBefore(draggable, afterElement);
                }
            });
        }

        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('.task-card:not(.dragging)')];
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        function saveNewOrder() {
            const currentTaskElements = [...taskList.querySelectorAll('.task-card')];
            const newTasksOrder = currentTaskElements.map(el => {
                const id = parseInt(el.dataset.id);
                return tasks.find(t => t.id === id);
            });
            tasks = newTasksOrder;
            saveToStorage();
            renderClock();
        }

        function renderClock() {
            donutSegments.innerHTML = '';
            const total = getTotalMinutes();
            totalTimeLabel.innerText = `Total Time: ${total}m`;
            let cumulativePercent = 0;
            tasks.forEach(task => {
                const percent = (task.duration / total) * 100;
                const strokeDasharray = `${percent} ${100 - percent}`;
                const strokeDashoffset = -cumulativePercent;
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", "50");
                circle.setAttribute("cy", "50");
                circle.setAttribute("r", "40");
                circle.setAttribute("fill", "transparent");
                circle.setAttribute("stroke", task.color);
                circle.setAttribute("stroke-width", "16");
                circle.setAttribute("stroke-dasharray", strokeDasharray);
                circle.setAttribute("stroke-dashoffset", strokeDashoffset);
                circle.setAttribute("pathLength", "100");
                donutSegments.appendChild(circle);
                cumulativePercent += percent;
            });
            updateUI();
        }

        window.editTask = function(id) {
            editingId = id;
            renderTasks();
        };

        window.setEditColor = function(id, color) {
            tasks = tasks.map(t => t.id === id ? { ...t, color: color } : t);
            saveToStorage();
            renderTasks();
            renderClock();
        };

        window.deleteTask = function(id) {
            tasks = tasks.filter(t => t.id !== id);
            editingId = null;
            saveToStorage();
            renderTasks();
            renderClock();
        };

        window.saveTask = function(id) {
            const nameInput = document.getElementById(`edit-name-${id}`);
            const durInput = document.getElementById(`edit-dur-${id}`);
            tasks = tasks.map(t => t.id === id ? {
                ...t, 
                name: nameInput.value || "Untitled Task", 
                duration: parseInt(durInput.value) || 1
            } : t);
            editingId = null;
            saveToStorage();
            renderTasks();
            renderClock();
        };

        addTaskBtn.addEventListener('click', () => {
            const newId = Date.now();
            const newTask = {
                id: newId,
                name: "",
                duration: 5,
                color: colors[tasks.length % colors.length]
            };
            tasks.push(newTask);
            editingId = newId;
            saveToStorage();
            renderTasks();
            renderClock();
        });

        function updateUI() {
            const totalMin = getTotalMinutes();
            const totalSec = totalMin * 60;
            const currentTotalMinutes = elapsedSeconds / 60;
            
            // Rotation of clock hand is still based on total progress
            const rotation = totalSec > 0 ? (elapsedSeconds / totalSec) * 360 : 0;
            hand.style.transform = `rotate(${rotation}deg)`;

            let runningSumMinutes = 0;
            let activeFound = false;
            let currentTaskId = null;
            let currentTaskRemainingSec = 0;

            tasks.forEach(task => {
                const row = document.getElementById(`task-row-${task.id}`);
                if (!row) return;

                const startTime = runningSumMinutes;
                const endTime = runningSumMinutes + task.duration;

                if (currentTotalMinutes >= startTime && currentTotalMinutes < endTime) {
                    row.classList.add('task-active');
                    currentTaskLabel.innerText = task.name;
                    activeFound = true;
                    currentTaskId = task.id;
                    
                    // Logic to calculate remaining time for CURRENT task
                    const taskElapsedSec = elapsedSeconds - (startTime * 60);
                    currentTaskRemainingSec = (task.duration * 60) - taskElapsedSec;
                } else {
                    row.classList.remove('task-active');
                }
                runningSumMinutes = endTime;
            });

            // Update Countdown Display
            if (activeFound) {
                const displayMin = Math.floor(currentTaskRemainingSec / 60);
                const displaySec = Math.floor(currentTaskRemainingSec % 60);
                timerDisplay.innerText = `${String(displayMin).padStart(2, '0')}:${String(displaySec).padStart(2, '0')}`;
            } else if (currentTotalMinutes >= totalMin && totalMin > 0) {
                timerDisplay.innerText = "00:00";
            } else {
                // If not started yet, show the first task's time
                if (tasks.length > 0 && elapsedSeconds === 0) {
                    timerDisplay.innerText = `${String(tasks[0].duration).padStart(2, '0')}:00`;
                } else {
                    timerDisplay.innerText = "00:00";
                }
            }

            // Task Transition Sounds
            if (currentTaskId !== null && currentTaskId !== lastTaskId) {
                if (lastTaskId !== null) {
                    playTripleBeep();
                }
                lastTaskId = currentTaskId;
            }

            // Finish State
            if (!activeFound && currentTotalMinutes >= totalMin && totalMin > 0) {
                currentTaskLabel.innerText = "All done! Go girls!";
                currentTaskLabel.classList.remove('text-indigo-500');
                currentTaskLabel.classList.add('text-green-500');
                if (lastTaskId !== "done") {
                    playTripleBeep();
                    lastTaskId = "done";
                }
                stopTimer();
            }
        }

        function startTimer() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (timer) return;
            startBtn.innerText = "Pause";
            startBtn.classList.replace('bg-indigo-600', 'bg-orange-500');
            
            timer = setInterval(() => {
                const totalSec = getTotalMinutes() * 60;
                if (elapsedSeconds < totalSec) {
                    elapsedSeconds++;
                    updateUI();
                } else {
                    stopTimer();
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timer);
            timer = null;
            startBtn.innerText = "Resume";
            if (startBtn.classList.contains('bg-orange-500')) {
                startBtn.classList.replace('bg-orange-500', 'bg-indigo-600');
            }
        }

        startBtn.addEventListener('click', () => {
            if (timer) stopTimer();
            else startTimer();
        });

        resetBtn.addEventListener('click', () => {
            stopTimer();
            elapsedSeconds = 0;
            lastTaskId = null;
            startBtn.innerText = "Start Routine";
            currentTaskLabel.innerText = "Ready to start?";
            currentTaskLabel.className = "text-sm font-semibold uppercase tracking-wider text-indigo-500 mt-3";
            updateUI();
        });

        testAudioBtn.addEventListener('click', () => {
            playTripleBeep();
        });

        renderTasks();
        renderClock();
    </script>
</body>
</html>
