<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Morning Routine Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            overscroll-behavior-y: contain;
            touch-action: pan-y;
            -webkit-tap-highlight-color: transparent;
        }

        .clock-container {
            position: relative;
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .clock-hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            width: 4px;
            height: 42%;
            background: #1e293b;
            transform-origin: bottom center;
            border-radius: 4px;
            z-index: 20;
            transition: transform 0.2s linear;
        }

        .clock-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 12px;
            height: 12px;
            background: #1e293b;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 30;
        }

        .task-card {
            user-select: none;
            -webkit-user-select: none;
            position: relative;
        }

        .is-dragging {
            opacity: 0.3;
            background-color: #f1f5f9 !important;
            border-style: dashed !important;
        }

        .drag-ghost {
            position: fixed !important;
            z-index: 9999;
            pointer-events: none;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transform: scale(1.05);
            opacity: 0.9;
        }

        .task-active {
            border-left: 10px solid !important;
            background-color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transform: scale(1.02);
            z-index: 10;
        }

        .drag-handle {
            cursor: grab;
            padding: 12px;
            color: #cbd5e1;
            touch-action: none;
        }

        .edit-input {
            border-bottom: 2px solid #e2e8f0;
            outline: none;
            background: transparent;
        }

        .color-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .color-dot.active {
            border-color: #6366f1;
            transform: scale(1.1);
        }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center min-h-screen">

    <div class="max-w-md w-full">
        <header class="text-center mb-6">
            <h1 class="text-3xl font-bold text-slate-800">Morning Routine</h1>
            <div class="flex flex-col items-center mt-1">
                <span id="totalTimeLabel" class="text-slate-500 font-bold text-sm">Total: --</span>
                <span id="finishTimeLabel" class="text-indigo-600 font-bold text-sm bg-indigo-50 px-3 py-1 rounded-full mt-1">Ends at --:--</span>
            </div>
        </header>

        <div class="flex justify-center mb-8">
            <div class="clock-container" id="clock">
                <div class="clock-center"></div>
                <div class="clock-hand" id="hand" style="transform: rotate(0deg)"></div>
                <svg viewBox="0 0 100 100" class="absolute inset-0 w-full h-full transform -rotate-90">
                    <g id="donut-segments"></g>
                </svg>
            </div>
        </div>

        <div class="text-center mb-4 bg-white py-5 rounded-2xl shadow-sm border border-slate-100">
            <div id="timerDisplay" class="text-6xl font-mono font-bold text-slate-800 leading-none">00:00</div>
            <div id="currentTaskLabel" class="text-sm font-black uppercase tracking-widest text-indigo-500 mt-4 px-4">Ready to start?</div>
        </div>

        <div class="flex flex-col gap-3 mb-8">
            <div class="flex gap-3">
                <button id="startBtn" class="flex-[2] bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-4 rounded-xl font-bold shadow-lg transition active:scale-95 text-lg">
                    Start Routine
                </button>
                <button id="resetBtn" class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 px-4 py-4 rounded-xl font-bold transition active:scale-95 text-sm uppercase tracking-wider">
                    Reset
                </button>
            </div>
            <button id="testAudioBtn" class="text-[10px] text-red-500 font-black uppercase hover:text-red-600 transition py-1 tracking-widest border border-red-100 rounded-lg">
                🚨 TEST MAX VOLUME ALERT 🚨
            </button>
        </div>

        <div id="taskList" class="space-y-3 mb-4">
            <!-- Tasks -->
        </div>

        <button id="addTaskBtn" class="w-full py-4 border-2 border-dashed border-slate-200 rounded-xl text-slate-400 font-bold hover:border-indigo-300 hover:text-indigo-400 transition flex items-center justify-center gap-2 mb-20">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Add New Task
        </button>
    </div>

    <script>
        const DEFAULT_TASKS = [
            { id: 1, name: "Wake up & Dress", duration: 15, color: "#93c5fd" },
            { id: 2, name: "Washroom", duration: 5, color: "#60a5fa" },
            { id: 3, name: "Eat Breakfast", duration: 20, color: "#fbbf24" },
            { id: 4, name: "Make Lunch", duration: 10, color: "#34d399" },
            { id: 5, name: "Brush Teeth", duration: 5, color: "#2dd4bf" },
            { id: 6, name: "Brush Hair", duration: 5, color: "#818cf8" },
            { id: 7, name: "School Bag", duration: 2, color: "#f472b6" },
            { id: 8, name: "Dance Bag", duration: 3, color: "#fb7185" },
            { id: 9, name: "Go to Car", duration: 5, color: "#475569" }
        ];

        let tasks = JSON.parse(localStorage.getItem('morning_routine_tasks')) || DEFAULT_TASKS;
        let timer = null;
        let elapsedSeconds = 0;
        let editingId = null;
        let lastTaskId = null;
        const colors = ["#93c5fd", "#60a5fa", "#fbbf24", "#34d399", "#2dd4bf", "#818cf8", "#f472b6", "#fb7185", "#475569", "#a855f7"];

        // High Intensity Audio System
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // Dynamic compressor to prevent clipping while pushing volume to 100%
        const compressor = audioCtx.createDynamicsCompressor();
        compressor.threshold.setValueAtTime(-10, audioCtx.currentTime);
        compressor.knee.setValueAtTime(40, audioCtx.currentTime);
        compressor.ratio.setValueAtTime(12, audioCtx.currentTime);
        compressor.attack.setValueAtTime(0, audioCtx.currentTime);
        compressor.release.setValueAtTime(0.25, audioCtx.currentTime);
        compressor.connect(audioCtx.destination);

        function playLoudAlert(frequency, startTime, duration = 0.3) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            // Square wave is much louder/harsher than sine wave
            osc.type = 'square'; 
            osc.frequency.setValueAtTime(frequency, startTime);
            
            // Ramp up/down to avoid "pops" while staying at peak volume
            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(0.4, startTime + 0.02); // 0.4 is very high for square waves
            gain.gain.setValueAtTime(0.4, startTime + duration - 0.05);
            gain.gain.linearRampToValueAtTime(0, startTime + duration);
            
            osc.connect(gain);
            gain.connect(compressor);
            
            osc.start(startTime);
            osc.stop(startTime + duration);
        }

        function playTripleLoudBeep() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            // High-pitched "alarm" style pattern
            playLoudAlert(900, now, 0.15);
            playLoudAlert(900, now + 0.25, 0.15);
            playLoudAlert(1200, now + 0.5, 0.3);
        }

        const taskList = document.getElementById('taskList');
        const donutSegments = document.getElementById('donut-segments');
        const timerDisplay = document.getElementById('timerDisplay');
        const hand = document.getElementById('hand');
        const totalTimeLabel = document.getElementById('totalTimeLabel');
        const finishTimeLabel = document.getElementById('finishTimeLabel');

        function saveToStorage() {
            localStorage.setItem('morning_routine_tasks', JSON.stringify(tasks));
        }

        function getTotalMinutes() {
            return tasks.reduce((sum, t) => sum + t.duration, 0);
        }

        function renderTasks() {
            taskList.innerHTML = '';
            tasks.forEach((task) => {
                const isEditing = editingId === task.id;
                const div = document.createElement('div');
                div.id = `task-row-${task.id}`;
                div.className = `task-card flex items-center p-4 rounded-xl border border-slate-200 bg-white transition-all duration-300`;
                div.style.borderLeft = `6px solid ${task.color}`;
                div.dataset.id = task.id;

                div.innerHTML = `
                    <div class="flex-1 min-w-0 pr-2 pointer-events-none">
                        ${isEditing ? 
                            `<div class="space-y-3 pointer-events-auto">
                                <input id="edit-name-${task.id}" class="edit-input font-bold text-lg text-slate-700 w-full" value="${task.name}" placeholder="Task Name">
                                <div class="flex items-center gap-2">
                                    <input id="edit-dur-${task.id}" type="number" class="edit-input w-20 text-lg" value="${task.duration}">
                                    <span class="text-xs text-slate-400 font-bold uppercase">Mins</span>
                                </div>
                                <div class="flex flex-wrap gap-2 pt-1">
                                    ${colors.map(c => `<div class="color-dot ${task.color === c ? 'active' : ''}" style="background-color: ${c}" onclick="setEditColor(${task.id}, '${c}')"></div>`).join('')}
                                </div>
                            </div>` : 
                            `<div class="font-bold text-slate-700 text-lg truncate">${task.name || 'Untitled Task'}</div>`
                        }
                        <div class="text-xs text-slate-400 font-bold uppercase tracking-wide">
                            ${!isEditing ? `${task.duration} minutes` : ''}
                        </div>
                    </div>
                    <div class="flex items-center gap-1 shrink-0">
                        <button id="next-btn-${task.id}" onclick="skipToNext(${task.id})" class="hidden flex items-center justify-center bg-green-500 text-white font-black px-4 py-3 rounded-xl mr-2 active:scale-90 transition shadow-lg shadow-green-100">
                           DONE
                        </button>
                        ${isEditing ? 
                            `<div class="flex flex-col gap-2">
                                <button onclick="saveTask(${task.id})" class="text-white font-bold text-sm bg-indigo-600 px-4 py-2 rounded-lg shadow-md">SAVE</button>
                                <button onclick="deleteTask(${task.id})" class="text-red-500 font-bold text-xs bg-red-50 px-4 py-2 rounded-lg">DEL</button>
                            </div>` : 
                            `<button onclick="editTask(${task.id})" class="text-slate-300 hover:text-indigo-600 p-3">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                            </button>
                            <div class="drag-handle touch-none p-3">
                                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                            </div>`
                        }
                    </div>
                `;

                const handle = div.querySelector('.drag-handle');
                if (handle) {
                    handle.addEventListener('touchstart', (e) => startDragging(e, div), { passive: false });
                }

                taskList.appendChild(div);
            });
            updateUI();
        }

        // --- DRAG & DROP ---
        let draggedEl = null;
        let ghostEl = null;
        let startY = 0;
        let offsetTop = 0;

        function startDragging(e, el) {
            if (editingId) return;
            e.preventDefault();
            draggedEl = el;
            const touch = e.touches[0];
            startY = touch.clientY;
            const rect = el.getBoundingClientRect();
            offsetTop = touch.clientY - rect.top;
            el.classList.add('is-dragging');
            ghostEl = el.cloneNode(true);
            ghostEl.classList.remove('is-dragging');
            ghostEl.classList.add('drag-ghost');
            ghostEl.style.width = rect.width + 'px';
            ghostEl.style.height = rect.height + 'px';
            ghostEl.style.top = rect.top + 'px';
            ghostEl.style.left = rect.left + 'px';
            document.body.appendChild(ghostEl);
            window.addEventListener('touchmove', moveDragging, { passive: false });
            window.addEventListener('touchend', stopDragging);
        }

        function moveDragging(e) {
            if (!ghostEl) return;
            e.preventDefault();
            const touch = e.touches[0];
            ghostEl.style.top = (touch.clientY - offsetTop) + 'px';
            const currentY = touch.clientY;
            const siblings = [...taskList.querySelectorAll('.task-card:not(.is-dragging)')];
            const nextSibling = siblings.find(sib => {
                const rect = sib.getBoundingClientRect();
                return currentY < rect.top + rect.height / 2;
            });
            if (nextSibling) taskList.insertBefore(draggedEl, nextSibling);
            else taskList.appendChild(draggedEl);
        }

        function stopDragging() {
            if (ghostEl) ghostEl.remove();
            if (draggedEl) draggedEl.classList.remove('is-dragging');
            ghostEl = null; draggedEl = null;
            window.removeEventListener('touchmove', moveDragging);
            window.removeEventListener('touchend', stopDragging);
            const currentItems = [...taskList.querySelectorAll('.task-card')];
            tasks = currentItems.map(item => tasks.find(t => t.id == item.dataset.id));
            saveToStorage();
            renderClock();
        }

        // --- LOGIC ---
        function renderClock() {
            donutSegments.innerHTML = '';
            const total = getTotalMinutes();
            totalTimeLabel.innerText = `Total: ${total} minutes`;
            let cumulativePercent = 0;
            tasks.forEach(task => {
                const percent = (task.duration / total) * 100;
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", "50"); circle.setAttribute("cy", "50"); circle.setAttribute("r", "40");
                circle.setAttribute("fill", "transparent"); circle.setAttribute("stroke", task.color);
                circle.setAttribute("stroke-width", "16"); circle.setAttribute("pathLength", "100");
                circle.setAttribute("stroke-dasharray", `${percent} ${100 - percent}`);
                circle.setAttribute("stroke-dashoffset", -cumulativePercent);
                donutSegments.appendChild(circle);
                cumulativePercent += percent;
            });
            updateUI();
        }

        function updateUI() {
            const totalSec = getTotalMinutes() * 60;
            const remainingTotalSec = Math.max(0, totalSec - elapsedSeconds);
            
            const now = new Date();
            const finishTime = new Date(now.getTime() + (remainingTotalSec * 1000));
            const hours = finishTime.getHours();
            const minutes = finishTime.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            const formattedTime = `${hours % 12 || 12}:${minutes.toString().padStart(2, '0')} ${ampm}`;
            finishTimeLabel.innerText = `Ends at ${formattedTime}`;

            hand.style.transform = `rotate(${totalSec > 0 ? (elapsedSeconds / totalSec) * 360 : 0}deg)`;

            const currentTotalMin = elapsedSeconds / 60;
            let runningMin = 0;
            let activeTask = null;
            let remainingSecForTask = 0;

            tasks.forEach(task => {
                const row = document.getElementById(`task-row-${task.id}`);
                const nextBtn = document.getElementById(`next-btn-${task.id}`);
                if (!row) return;
                
                const start = runningMin;
                const end = runningMin + task.duration;

                if (currentTotalMin >= start && currentTotalMin < end) {
                    row.classList.add('task-active');
                    if (nextBtn) nextBtn.classList.remove('hidden');
                    activeTask = task;
                    remainingSecForTask = (task.duration * 60) - (elapsedSeconds - start * 60);
                } else {
                    row.classList.remove('task-active');
                    if (nextBtn) nextBtn.classList.add('hidden');
                }
                runningMin = end;
            });

            if (activeTask) {
                timerDisplay.innerText = `${Math.floor(remainingSecForTask / 60).toString().padStart(2,'0')}:${Math.floor(remainingSecForTask % 60).toString().padStart(2,'0')}`;
                document.getElementById('currentTaskLabel').innerText = activeTask.name;
            } else if (elapsedSeconds > 0 && totalSec > 0) {
                timerDisplay.innerText = "00:00";
                document.getElementById('currentTaskLabel').innerText = "All done! Go girls!";
            } else if (tasks[0]) {
                timerDisplay.innerText = `${tasks[0].duration.toString().padStart(2,'0')}:00`;
            }

            if (activeTask && activeTask.id !== lastTaskId) {
                if (lastTaskId !== null) playTripleLoudBeep();
                lastTaskId = activeTask.id;
            }
        }

        window.skipToNext = id => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            let runningMin = 0;
            for(let task of tasks) {
                if (task.id === id) {
                    elapsedSeconds = (runningMin + task.duration) * 60;
                    updateUI();
                    break;
                }
                runningMin += task.duration;
            }
        };

        window.editTask = id => { editingId = id; renderTasks(); };
        window.saveTask = id => {
            const t = tasks.find(x => x.id === id);
            t.name = document.getElementById(`edit-name-${id}`).value;
            t.duration = parseInt(document.getElementById(`edit-dur-${id}`).value) || 1;
            editingId = null; saveToStorage(); renderTasks(); renderClock();
        };
        window.deleteTask = id => { tasks = tasks.filter(x => x.id !== id); editingId = null; saveToStorage(); renderTasks(); renderClock(); };
        window.setEditColor = (id, c) => { tasks.find(x => x.id === id).color = c; saveToStorage(); renderTasks(); renderClock(); };

        document.getElementById('addTaskBtn').onclick = () => {
            const id = Date.now();
            tasks.push({ id, name: "", duration: 5, color: colors[tasks.length % colors.length] });
            editingId = id; renderTasks();
        };

        document.getElementById('startBtn').onclick = function() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (timer) {
                clearInterval(timer); timer = null; this.innerText = "Resume"; 
                this.classList.replace('bg-orange-500', 'bg-indigo-600');
            } else {
                this.innerText = "Pause"; 
                this.classList.replace('bg-indigo-600', 'bg-orange-500');
                timer = setInterval(() => {
                    const totalLimit = getTotalMinutes() * 60;
                    if (elapsedSeconds < totalLimit) { 
                        elapsedSeconds++; 
                        updateUI(); 
                    } else { 
                        clearInterval(timer); 
                        timer = null; 
                    }
                }, 1000);
            }
        };

        document.getElementById('resetBtn').onclick = () => {
            clearInterval(timer); timer = null; elapsedSeconds = 0; lastTaskId = null;
            document.getElementById('startBtn').innerText = "Start Routine";
            document.getElementById('startBtn').className = "flex-[2] bg-indigo-600 text-white px-6 py-4 rounded-xl font-bold shadow-lg text-lg";
            updateUI();
        };

        setInterval(() => { if (!timer) updateUI(); }, 1000);

        document.getElementById('testAudioBtn').onclick = playTripleLoudBeep;

        renderTasks();
        renderClock();
    </script>
</body>
</html>
